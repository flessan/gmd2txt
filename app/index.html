<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gmd2txt landing-pages</title>
<style>
  /* Variabel warna & Reset dasar */
  :root { --bg: #87CEEB; --y: #FFE135; --g: #9ACD32; --b: #5D4037; }
  * { box-sizing: border-box; }
  
  body {
    background: linear-gradient(180deg, #87CEEB, #B3E5FC);
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
    color: var(--b);
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    text-align: center; /* Pusatkan semua konten */
  }

  /* Gaya Umum Elemen */
  img { width: 100%; border-radius: 20px; border: 5px solid var(--b); margin-bottom: 20px; }
  hr { border: 2px dashed var(--b); margin: 20px 0; }
  
  /* Teks & Tombol Utama */
  h1 { font-size: 24px; background: var(--y); display: inline-block; padding: 10px 20px; border-radius: 15px; border: 4px solid var(--b); }
  h1 a { color: #2E7D32; text-decoration: underline; }
  
  .btn-main {
    display: block;
    background: var(--y);
    color: var(--b);
    font-weight: bold;
    font-size: 18px;
    text-decoration: none;
    padding: 15px;
    margin: 20px auto;
    max-width: 300px;
    border-radius: 50px;
    border: 4px solid var(--b);
    box-shadow: 4px 4px 0 var(--b); /* Efek kartun */
    transition: 0.1s;
  }
  .btn-main:hover { background: var(--g); transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--b); }

  /* Accordion (Dropdown) */
  .hd {
    background: var(--g);
    padding: 12px;
    border: 3px solid var(--b);
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    text-align: left;
  }
  .hd:hover { background: var(--y); }
  .arr { display: inline-block; width: 20px; transition: 0.2s; }
  .open .arr { transform: rotate(90deg); }
  
  .sub {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s;
    background: #FFFDE7;
    border: 3px solid var(--b);
    border-top: none;
    border-radius: 0 0 10px 10px;
  }
  .open+.sub { max-height: 200px; }
  
  .sub a {
    display: block;
    color: var(--b);
    text-decoration: none;
    padding: 10px;
    border-bottom: 1px dashed var(--b);
  }
  .sub a:last-child { border-bottom: none; }
  .sub a:hover { background: var(--y); }
</style>
</head>
